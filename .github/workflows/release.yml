name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.1.5)'
        required: true
      skip_publish:
        description: 'Skip crates.io publish (for testing)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        persist-credentials: false
    - run: gh auth setup-git
      env:
        GH_HOST: github.com
    - name: Validate version format
      env:
        VERSION: ${{ github.event.inputs.version }}
      run: |
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Invalid version format: '$VERSION'. Expected X.Y.Z (e.g. 1.2.3)"
          exit 1
        fi
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        targets: wasm32-unknown-unknown
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    - name: Update Cargo.toml version
      env:
        VERSION: ${{ github.event.inputs.version }}
      run: |
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" lib/Cargo.toml
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" wasm/Cargo.toml
    - name: Update Cargo.lock
      run: |
        cargo update -p budoux-phf-rs
        cargo update -p budoux-phf-rs-wasm
    - name: Run tests
      run: cargo test --package budoux-phf-rs
    - name: Build wasm packages (full + per-language, web + bundler)
      run: scripts/build-wasm.sh
    - name: Package wasm artifacts
      env:
        VERSION: ${{ github.event.inputs.version }}
      run: |
        cd wasm
        for dir in pkg/*/; do
          variant="$(basename "$dir")"
          asset="budoux-phf-rs-wasm-${variant//_/-}-v${VERSION}.zip"
          zip -r "../${asset}" "pkg/${variant}"
          echo "Packaged ${asset}"
        done
    - name: Commit and tag
      env:
        VERSION: ${{ github.event.inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add lib/Cargo.toml wasm/Cargo.toml Cargo.lock
        git diff --cached --quiet || git commit -m "bump version to $VERSION"
        git tag "v$VERSION"
        git push origin HEAD
        git push origin "v$VERSION"
    - name: Create GitHub Release
      env:
        VERSION: ${{ github.event.inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "v${VERSION}" \
          --title "v${VERSION}" \
          --generate-notes \
          budoux-phf-rs-wasm-*-v"${VERSION}".zip
    - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4
      id: auth
      if: ${{ !inputs.skip_publish }}
    - run: cargo publish --package budoux-phf-rs
      if: ${{ !inputs.skip_publish }}
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
